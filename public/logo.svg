<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#F97316" />
      <stop offset="100%" stopColor="#EA580C" />
    </linearGradient>
  </defs>
  <rect width="60" height="60" rx="14" fill="url(#g)" />
  <!-- Trolley basket body - wider at top -->
  <path d="M12,18 L15,40 C15,42 17,43.5 19,43.5 L41,43.5 C43,43.5 45,42 45,40 L48,18 Z" fill="white" />
  <!-- Trolley grid lines -->
  <path d="M13,28 L47,28" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" />
  <path d="M14,34 L46,34" fill="none" stroke="url(#g)" stroke-width="1.3" stroke-linecap="round" />
  <!-- Wheels with hubs -->
  <circle cx="20" cy="46" r="4" fill="white" />
  <circle cx="20" cy="46" r="1.5" fill="url(#g)" />
  <circle cx="40" cy="46" r="4" fill="white" />
  <circle cx="40" cy="46" r="1.5" fill="url(#g)" />
  <!-- Thick handle arc -->
  <path d="M14,18 C14,8 22,4 30,4 C38,4 46,8 46,18" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" />
  <!-- Handle grip -->
  <path d="M26,7 C26,5 28,3 30,3 C32,3 34,5 34,7" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  <!-- Accent dot -->
  <circle cx="30" cy="4" r="2" fill="white" opacity="0.9" />
</svg>
